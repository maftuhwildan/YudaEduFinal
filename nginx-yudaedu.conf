server {
    server_name yudaedu.tech www.yudaedu.tech;

    location /uploads/ {
        alias /var/www/yudaedu/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/yudaedu.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yudaedu.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = yudaedu.tech) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name yudaedu.tech www.yudaedu.tech;
    return 404;
}
